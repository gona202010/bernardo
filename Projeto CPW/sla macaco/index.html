<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Duo?</title>
    <style>
        /* Estilos globais (estilo editor de código/Discord) */
        body {
            margin: 0;
            padding: 0;
            background-color: #2c2f33; /* Fundo escuro */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Impede a rolagem para que os fogos permaneçam na tela */
        }

        /* Layout lateral do editor (fictício) */
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #23272a;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px; }
        .sidebar-item { color: #888; font-family: monospace; margin-bottom: 8px; cursor: pointer; }
        .sidebar-item.active { color: #fff; font-weight: bold; }

        /* Contêiner principal do convite */
        .convite-container {
            margin-left: 270px; /* Alinha com a barra lateral */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Elementos visuais antes do 'Sim' */
        #convite-inicial {
            background-color: #23272a;
            padding: 60px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 600px;
        }
        #convite-inicial h1 { font-size: 3rem; margin-bottom: 30px; }
        #convite-inicial .botoes { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        
        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-weight: bold;
        }
        #btn-sim { background-color: #7289da; color: white; }
        #btn-sim:hover { background-color: #677bc4; transform: scale(1.05); }
        #btn-nao { background-color: #4f545c; color: white; }
        #btn-nao:hover { background-color: #40444b; transform: scale(0.95); }

        /* Elementos visuais após o 'Sim' */
        #convite-sucesso {
            display: none; /* Inicialmente escondido */
            max-width: 700px;
            background-color: #23272a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #convite-sucesso h2 { font-size: 2rem; margin-bottom: 20px; color: #43b581; /* Verde Discord */ }
        #coitadolandia-container { position: relative; width: 100%; text-align: center; }
        #img-coitadolandia {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .fogos { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .fogos span { position: absolute; width: 10px; height: 10px; border-radius: 50%; animation: firework 1s linear infinite; }
        .fogos span:nth-child(1) { background-color: #ff0; animation-delay: 0s; left: 10%; top: 10%; }
        .fogos span:nth-child(2) { background-color: #f0f; animation-delay: 0.2s; left: 20%; top: 30%; }
        .fogos span:nth-child(3) { background-color: #0ff; animation-delay: 0.4s; left: 80%; top: 20%; }
        .fogos span:nth-child(4) { background-color: #0f0; animation-delay: 0.6s; left: 90%; top: 40%; }
        .fogos span:nth-child(5) { background-color: #f00; animation-delay: 0.8s; left: 50%; top: 15%; }

        @keyframes firework {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(10); opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- Barra lateral fictícia do editor -->
    <div class="sidebar">
        <h2>EXPLORER</h2>
        <div class="sidebar-item">_convite.html</div>
        <div class="sidebar-item">_styles.css</div>
        <div class="sidebar-item active">_convite.js</div>
    </div>

    <!-- Contêiner principal do convite -->
    <div class="convite-container">
        
        <!-- Estado Inicial -->
        <div id="convite-inicial">
            <h1>Você quer ser minha duo? 🎮❤️</h1>
            <div class="botoes">
                <button id="btn-sim">Sim</button>
                <button id="btn-nao">Não</button>
            </div>
        </div>

        <!-- Estado de Sucesso (após clicar Sim) -->
        <div id="convite-sucesso">
            <h2>EBAAAAAA!!!!</h2>
            <div id="coitadolandia-container">
                <img id="img-coitadolandia" src="c8a3c3fd01ef6eb4e8aa410df46ad2e3.jpg" alt="Um gatinho muito fofo e carente (Coitadolandia)">
                <div class="fogos">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
            </div>
            <p>Digamos q eu nao tenha pensado em nada mto bom, MAS vai ser divertido</p>
        </div>

    </div>

    <script>
        const btnSim = document.getElementById('btn-sim');
        const btnNao = document.getElementById('btn-nao');
        const conviteInicial = document.getElementById('convite-inicial');
        const conviteSucesso = document.getElementById('convite-sucesso');

        // Função para mover o botão "Não"
        btnNao.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - btnNao.offsetWidth - 300); // Ajuste para a barra lateral
            const y = Math.random() * (window.innerHeight - btnNao.offsetHeight);
            btnNao.style.position = 'absolute';
            btnNao.style.left = `${x + 280}px`; // Adiciona margem para a barra lateral
            btnNao.style.top = `${y}px`;
        });

        // Função para exibir o sucesso
        btnSim.addEventListener('click', () => {
            conviteInicial.style.display = 'none';
            conviteSucesso.style.display = 'block';
            // Os fogos já estão definidos no CSS, então aparecem automaticamente
        });
    </script>

</body>
</html>
